services:
  crawlix:
    build: .
    container_name: crawlix
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_ENABLED=true
      - SCRAPER_DEFAULT_STRATEGY=cloudscraper
      - PLAYWRIGHT_HEADLESS=true
      # SigNoz / OpenTelemetry — fill in your values
      - OTEL_SERVICE_NAME=crawlix
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://ingest.us.signoz.cloud:443
      - OTEL_EXPORTER_OTLP_HEADERS=signoz-ingestion-key=<your-ingestion-key>
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - crawlix-network

  redis:
    image: redis:7-alpine
    container_name: crawlix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - crawlix-network

networks:
  crawlix-network:
    driver: bridge

volumes:
  redis-data:
